<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Snake - Arcade Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/snake.css">
  <link rel="stylesheet" href="../css/music.css">
</head>
<body>
  <!-- Start Overlay -->
  <div id="start-overlay" class="modal-overlay is-visible">
    <div class="start-message">
      <i class='bx bx-pointer bx-tada'></i>
      <p>Toca o haz clic para iniciar</p>
    </div>
  </div>


  <!-- Question Modal -->
  <div id="question-modal" class="modal-overlay" aria-hidden="true">
    <div class="modal">
      <div class="modal-icon-wrap danger">
        <i class='bx bxs-skull'></i>
      </div>
      <h2>¡Game Over!</h2>
      <p>Para seguir jugando tienes que responder unas preguntas.</p>
      <a class="modal-btn" href="questions.html?source=snake">Responder &amp; Reintentar</a>
    </div>
  </div>

  <canvas id="snake-canvas"></canvas>

  <div id="score-display">Puntos: <span id="score">0</span></div>

  <script src="../js/snake.js"></script>
  <script src="../js/music.js"></script>
</body>
</html>
