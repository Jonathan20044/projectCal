<!DOCTYPE html>
<html lang="en">
<head>
  <title>CodePen - Flappy Dino</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/flappyDino.css">
</head>

<body>
<!-- partial:index.partial.html -->

<button id="btn-menu" onclick="window.location.href='../index.html';">
  Regresar al menú
</button>

<div id="start-overlay" class="modal-overlay is-visible" aria-hidden="false">
  <div class="start-message">
    <i class='bx bx-pointer bx-tada'></i>
    <p>Toca o haz clic para iniciar</p>
  </div>
</div>

<div class="ctn">
  <canvas id="c" width="360px" height="640px"></canvas>
  <div id="scoreboard">0</div>
  <div id="gameover-screen">
    <div id="gameover">FIN DEL JUEGO</div>
    <div id="replay">REINICIAR</div>
  </div>
  <div id="question-modal" class="modal-overlay" aria-hidden="true">
    <div class="modal">
      <h2>Debes responder unas preguntas.</h2>
      <p>Responde 4 preguntas de matematica basica para continuar.</p>
      <a class="modal-btn" href="questions.html?source=flappy">Responder</a>
    </div>
  </div>
</div>

<!-- partial -->
<script src="../js/flappyDino.js"></script>

</body>
</html>
