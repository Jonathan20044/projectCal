<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Orbit Rift - Arcade Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/coloron.css?v=20260420a">
</head>

<body>
  <button id="btn-menu" data-menu-exit>
    Regresar al menu
  </button>

  <div id="start-overlay" class="modal-overlay is-visible" aria-hidden="false">
    <div class="start-message">
      <i class='bx bx-pointer bx-tada'></i>
      <p>Toca o haz clic para iniciar</p>
    </div>
  </div>

  <div id="question-modal" class="modal-overlay" aria-hidden="true">
    <div class="modal">
      <div class="modal-icon-wrap danger">
        <i class='bx bxs-error'></i>
      </div>
      <h2>Orbita desestabilizada</h2>
      <p>Responde una pregunta de matematicas para continuar.</p>
      <a class="modal-btn danger-btn" href="questions.html?source=coloron">Responder y continuar</a>
    </div>
  </div>

  <div id="menu-confirm-modal" class="modal-overlay" aria-hidden="true">
    <div class="modal">
      <h2>Volver al menu</h2>
      <p>Si sales ahora, perderas los puntos actuales.</p>
      <a class="modal-btn" href="../index.html" id="confirm-menu-exit">Si, volver al menu</a>
      <a class="modal-btn" href="#" id="cancel-menu-exit">Cancelar</a>
    </div>
  </div>

  <canvas id="game-canvas"></canvas>

  <div id="hud">
    <div id="score-box">Puntos <span id="score">0</span></div>
    <div id="level-box">Nivel <span id="level">1</span></div>
    <div id="lives-box">Vidas <span id="lives">3</span></div>
  </div>

  <script src="../js/coloron.js?v=20260420a"></script>
  <script>
    (function () {
      const menuModal = document.getElementById("menu-confirm-modal");
      const menuTriggers = document.querySelectorAll("[data-menu-exit]");
      const confirmBtn = document.getElementById("confirm-menu-exit");
      const cancelBtn = document.getElementById("cancel-menu-exit");
      const progressKeys = [
        "pacmanResume",
        "pacmanResumeOk",
        "pacmanRestart",
        "pacmanForceRestart",
        "flappyResumeOk",
        "flappyRestart",
        "stickHeroLives",
        "stickHeroPaused",
        "stickHeroCheckpointState",
        "stickHeroRestart",
        "coloronPaused",
        "coloronLives",
        "coloronCheckpointState",
        "coloronSkipNextCheck",
        "coloronRestart",
        "snakeResumeOk",
        "snakeRestart",
        "meteorResume",
        "meteorResumeOk",
        "meteorRestart",
        "neonbreakerResume",
        "neonbreakerResumeOk",
        "neonbreakerRestart",
        "lastAnswerCorrect"
      ];

      if (!menuModal || !menuTriggers.length || !confirmBtn || !cancelBtn) return;

      const clearStoredProgress = () => {
        progressKeys.forEach((key) => localStorage.removeItem(key));

        window.dispatchEvent(new Event("arcade:menu-exit"));

        if (window.PACMAN && typeof window.PACMAN.shutdown === "function") {
          window.PACMAN.shutdown();
        }

        if (window.game && typeof window.game.stop === "function") {
          window.game.stop(false);
        }

        if (typeof window.resetGame === "function") {
          window.resetGame(true);
        }
      };

      const closeMenuModal = (event) => {
        if (event) event.preventDefault();
        menuModal.classList.remove("is-visible");
        menuModal.setAttribute("aria-hidden", "true");
      };

      const openMenuModal = (event) => {
        event.preventDefault();
        menuModal.classList.add("is-visible");
        menuModal.setAttribute("aria-hidden", "false");
      };

      menuTriggers.forEach((trigger) => trigger.addEventListener("click", openMenuModal));
      confirmBtn.addEventListener("click", clearStoredProgress);
      cancelBtn.addEventListener("click", closeMenuModal);
      menuModal.addEventListener("click", (event) => {
        if (event.target === menuModal) closeMenuModal();
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && menuModal.classList.contains("is-visible")) {
          closeMenuModal();
        }
      });
    })();
  </script>
</body>
</html>
