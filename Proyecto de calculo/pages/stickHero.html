<!DOCTYPE html>
<html lang="en">
<head>
  <title>Stick Hero</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/stickHero.css?v=20260418a">
</head>

<body>

  <button id="btn-menu" onclick="window.location.href='../index.html';">
    Regresar al menú
  </button>

  <div id="start-overlay" class="modal-overlay is-visible" aria-hidden="false">
    <div class="start-message">
      <i class='bx bx-pointer bx-tada'></i>
      <p>Toca o haz clic para iniciar</p>
    </div>
  </div>

  <div class="container">
    <div id="score"></div>
    <div id="lives">❤️❤️❤️</div>
    <canvas id="game" width="375" height="375"></canvas>
    <div id="introduction">Mantén presionado el mouse para estirar el palo</div>
    <div id="perfect">DOBLE PUNTUACIÓN</div>
    <button id="restart">REINICIAR</button>
    <div id="question-modal" class="modal-overlay" aria-hidden="true">
      <div class="modal">
        <h2>Debes responder unas preguntas.</h2>
        <p>Responde 4 preguntas de matematica basica para continuar.</p>
        <a class="modal-btn" href="questions.html?source=stickHero">Responder</a>
      </div>
    </div>
  </div>

  <script src="../js/stickHero.js?v=20260418a"></script>
</body>
</html>
